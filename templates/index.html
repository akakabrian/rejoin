<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>session-dash</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>session-dash</h1>
  <div class="controls">
    <form id="filters"
          hx-get="/sessions"
          hx-target="#session-list"
          hx-trigger="change, keyup delay:300ms from:input[name=q], submit, every 30s [!document.querySelector('input[name=q]:focus')]">
      <select name="tool">
        <option value="">all tools</option>
        <option value="claude">claude</option>
        <option value="codex">codex</option>
      </select>
      <select name="cwd">
        <option value="">all cwds</option>
        {% for c in cwds %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select>
      <input name="q" type="search" placeholder="search titles/prompts…">
      <label class="toggle" title="group by cwd">
        <input type="checkbox" name="group" value="true"> grouped
      </label>
    </form>
    <button id="refresh-btn" class="icon-btn" title="re-index now" aria-label="re-index now">↻</button>
    <span id="refresh-age" class="muted refresh-age"></span>
  </div>
</header>
<main>
  <section id="session-list">{% include "_sessions.html" %}</section>
  <aside id="detail-pane"><p class="muted">select a session to view transcript</p></aside>
</main>
<div class="kbd-hint"><kbd>j</kbd><kbd>k</kbd> nav · <kbd>Enter</kbd> rejoin · <kbd>p</kbd> pin · <kbd>/</kbd> search</div>
<script src="/static/app.js"></script>
</body>
</html>
